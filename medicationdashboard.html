<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medication Dashboard | Remi+</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{
            background:linear-gradient(135deg,#f3f0ff,#e9e5ff);
            min-height:100vh;
            padding:40px;
        }

        nav{
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:20px 40px;
            background:rgba(255,255,255,.8);
            border-radius:50px;
            margin-bottom:30px;
            box-shadow:0 5px 15px rgba(0,0,0,.08);
        }

        .logo{
            font-size:24px;
            font-weight:700;
            color:#7B68EE;
        }

        .nav-links{
            display:flex;
            align-items:center;
            gap:20px;
        }

        .nav-links a{
            text-decoration:none;
            color:#333;
            font-weight:500;
        }

        .login-btn{
            background:#7B68EE;
            color:white !important;
            padding:10px 25px;
            border-radius:20px;
        }

        .container{
            background:white;
            border-radius:20px;
            padding:35px;
            box-shadow:0 15px 40px rgba(123,104,238,.15);
        }

        .header{
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:25px;
        }

        .header h1{
            color:#333;
        }

        .buttons{
            display:flex;
            gap:10px;
        }

        .add-btn{
            background:#7B68EE;
            color:white;
            border:none;
            padding:12px 18px;
            border-radius:10px;
            cursor:pointer;
            font-weight:600;
        }

        .refresh-btn{
            background:#4F46E5;
        }

        #searchBox{
            width:100%;
            padding:12px;
            border:2px solid #ddd;
            border-radius:10px;
            margin-bottom:20px;
            font-size:15px;
        }

        table{
            width:100%;
            border-collapse:collapse;
        }

        thead{
            background:#F4F2FF;
        }

        th{
            text-align:left;
            padding:15px;
            color:#7B68EE;
        }

        td{
            padding:15px;
            border-bottom:1px solid #eee;
            color:#555;
        }

        tr:hover{
            background:#faf9ff;
        }

        .status{
            padding:6px 12px;
            border-radius:20px;
            color:white;
            font-size:13px;
            display:inline-block;
        }

        .pending{
            background:#f39c12;
        }

        .taken{
            background:#27ae60;
        }

        .missed{
            background:#e74c3c;
        }

        .loading{
            text-align:center;
            color:#888;
            padding:40px;
        }

        .error{
            text-align:center;
            color:red;
            padding:30px;
        }
        /* Button container styling */
.action-buttons {
    display: flex;
    gap: 5px;
}

/* Base button style */
.btn-action {
    padding: 6px 12px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 500;
    transition: background 0.2s;
}

/* Edit button specific */
.edit-btn {
    background-color: #7B68EE;
    color: white;
}
.edit-btn:hover { background-color: #6a5acd; }

/* Delete button specific */
.delete-btn {
    background-color: #e74c3c;
    color: white;
}
.delete-btn:hover { background-color: #c0392b; }
    </style>

</head>
<div id="editModal" style="display:none; position:fixed; top:20%; left:30%; background:white; padding:25px; border-radius:15px; box-shadow:0 0 20px rgba(0,0,0,0.2); z-index:1000;">
    <h3>Edit Medication</h3>
    <input type="hidden" id="editId">
    <input type="text" id="editDosage" placeholder="New Dosage" style="display:block; width:100%; margin:10px 0; padding:8px;">
    <input type="text" id="editFrequency" placeholder="New Frequency" style="display:block; width:100%; margin:10px 0; padding:8px;">
    <button onclick="saveEdit()" class="add-btn">Save Changes</button>
    <button onclick="document.getElementById('editModal').style.display='none'" class="delete-btn" style="background:#888;">Cancel</button>
</div>

<body>

<nav>

    <div class="logo">Remi+</div>

    <div class="nav-links">
        <a href="#">Home</a>
        <a href="#">AI Chat</a>
        <a href="#">Medications</a>
        <a href="#">Appointments</a>
        <a href="#">Contact</a>
        <a href="#" class="login-btn">Login</a>
    </div>

</nav>

<div class="container">

    <div class="header">

        <h1>Medication Dashboard</h1>

        <div class="buttons">
    <a href="index.html" class="add-btn">+ Add Medication</a>
    
    <button class="add-btn refresh-btn" onclick="fetchMedications()">
        Refresh
    </button>
</div>

    </div>

    <input
        type="text"
        id="searchBox"
        placeholder="Search medication..."
    >

    <table>

        <thead>
    <tr>
        <th>Patient</th>
        <th>Medication</th>
        <th>Dosage</th>
        <th>Time</th>
        <th>Frequency</th>
        <th>Status</th>
        <th>Action</th> <!-- Add this header -->
    </tr>
</thead>

        <tbody id="medTableBody">

            <tr>
                <td colspan="6" class="loading">
                    Loading medications...
                </td>
            </tr>

        </tbody>

    </table>

</div>

<script>
const WEBHOOK_URL = "https://n8ngc.codeblazar.org/webhook/medication-form";

async function fetchMedications() {
    const tbody = document.getElementById("medTableBody");
    tbody.innerHTML = `<tr><td colspan="7" class="loading">Loading medications...</td></tr>`;

    try {
        const response = await fetch(WEBHOOK_URL);
        if (!response.ok) throw new Error("HTTP Error " + response.status);

        const data = await response.json();
        const medications = Array.isArray(data) ? data : (data.data || [data]);

        tbody.innerHTML = "";

        if (medications.length === 0) {
            tbody.innerHTML = `<tr><td colspan="7" class="loading">No medication records found.</td></tr>`;
            return;
        }

        medications.forEach(item => {
    const status = (item.status || "Pending").toLowerCase();
    let badge = (status === "taken") ? "taken" : (status === "missed") ? "missed" : "pending";

    tbody.innerHTML += `
        <tr>
            <td>${item.patientName || item.Patientname || "-"}</td>
            <td>${item["Medication Name"] || item.medication || item.medicationName || "-"}</td>
            <td>${item.dosage || item.DosageLevel || "-"}</td>
            <td>${item.time || item.Time || "-"}</td>
            <td>${item.frequency || item.Frequency || "-"}</td>
            <td><span class="status ${badge}">${item.status || "Pending"}</span></td>
            <td>
                <button onclick="editMedication('${item.ID}')" class="add-btn" style="padding: 5px 10px; margin-right: 5px;">Edit</button>
                <button onclick="deleteMedication('${item.ID}')" class="delete-btn" style="padding: 5px 10px; margin-right: 5px;">Delete</button>
            </td>
        </tr>
    `;
});
    } catch (error) {
        console.error(error);
        tbody.innerHTML = `<tr><td colspan="7" class="error">Failed to load medications.<br>${error.message}</td></tr>`;
    }
}

async function deleteMedication(id) {
    if (!confirm("Are you sure you want to delete this record?")) return;

    try {
        const response = await fetch("https://n8ngc.codeblazar.org/webhook/delete-medication", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ id: id })
        });

        if (response.ok) {
            alert("Record deleted successfully!");
            fetchMedications(); 
        } else {
            alert("Failed to delete record.");
        }
    } catch (error) {
        console.error("Delete error:", error);
        alert("Check the console for errors.");
    }
}

fetchMedications();

document.getElementById("searchBox").addEventListener("keyup", function() {
    const keyword = this.value.toLowerCase();
    const rows = document.querySelectorAll("#medTableBody tr");
    rows.forEach(row => {
        row.style.display = row.innerText.toLowerCase().includes(keyword) ? "" : "none";
    });
});

// ADD THESE FUNCTIONS TO YOUR <script> TAG
function editMedication(id) {
    document.getElementById('editId').value = id;
    document.getElementById('editModal').style.display = 'block';
}

async function saveEdit() {
    const id = document.getElementById('editId').value;
    const dosage = document.getElementById('editDosage').value;
    const frequency = document.getElementById('editFrequency').value;

    // This is the JSON object the AI is waiting for
    const payload = {
        id: id,
        dosage: dosage,
        frequency: frequency
    };

    console.log("Sending payload to n8n:", JSON.stringify(payload));

    try {
        const response = await fetch("https://n8ngc.codeblazar.org/webhook/update-medication-tool", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        });

        if (response.ok) {
            alert("Update request sent successfully!");
            document.getElementById('editModal').style.display = 'none';
            await fetchMedications(); 
        } else {
            alert("Update failed. Check n8n execution logs.");
        }
    } catch (error) {
        console.error(error);
        alert("Network error.");
    }
}
</script>

</body>
</html>
