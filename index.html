<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Medication Information Form</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    /* Updated background to a soft purple gradient */
    background:linear-gradient(135deg, #f3f0ff, #e9e5ff);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:40px;
}

.container{
    width:100%;
    max-width:750px;
}

.form-card{
    background:white;
    border-radius:20px;
    padding:40px;
    box-shadow:0 15px 40px rgba(123, 104, 238, 0.15);
}

.header{
    text-align:center;
    margin-bottom:35px;
}

.header h1{
    color:#7B68EE;
    font-size:30px;
    margin-bottom:10px;
}

.header p{
    color:#666;
    font-size:15px;
}

.form-group{
    margin-bottom:25px;
}

label{
    display:block;
    font-weight:600;
    margin-bottom:10px;
    color:#333;
}

input[type="text"],
input[type="email"],
input[type="time"]{
    width:100%;
    padding:15px;
    border:2px solid #e0dcfc;
    border-radius:12px;
    outline:none;
    font-size:15px;
    transition:0.3s;
}

select{
    width:100%;
    padding:15px;
    border:2px solid #e0dcfc;
    border-radius:12px;
    font-size:15px;
    outline:none;
    transition:.3s;
    background:white;
}

select:focus{
    border-color:#7B68EE;
    box-shadow:0 0 0 4px rgba(123, 104, 238, 0.15);
}

input[type="text"]:focus,
input[type="email"]:focus,
input[type="time"]:focus{
    border-color:#7B68EE;
    box-shadow:0 0 0 4px rgba(123, 104, 238, 0.15);
}

.radio-group{
    display:flex;
    flex-wrap:wrap;
    gap:15px;
}

.radio-option{
    flex:1;
    min-width:180px;
}

.radio-option label{
    display:flex;
    align-items:center;
    gap:10px;
    background:#faf9ff;
    border:2px solid #e0dcfc;
    border-radius:12px;
    padding:15px;
    cursor:pointer;
    transition:0.3s;
    font-weight:500;
}

.radio-option label:hover{
    background:#f2efff;
    border-color:#7B68EE;
}

input[type="radio"]{
    accent-color:#7B68EE;
    transform:scale(1.2);
}

button{
    width:100%;
    margin-top:10px;
    padding:16px;
    border:none;
    border-radius:12px;
    background:#7B68EE;
    color:white;
    font-size:17px;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#6a5acd;
    transform:translateY(-2px);
    box-shadow:0 10px 20px rgba(123, 104, 238, 0.3);
}

.success{
    display:none;
    margin-top:25px;
    background:#e8fff1;
    color:#0B8A45;
    padding:16px;
    border-radius:12px;
    text-align:center;
    font-weight:600;
}

@media(max-width:768px){
    .form-card{
        padding:25px;
    }
    .radio-group{
        flex-direction:column;
    }
    .header h1{
        font-size:25px;
    }
}

</style>

</head>

<body>

<div class="container">

<div class="form-card">

<div class="header">
<h1>Medication Information Form</h1>
<p>Please complete the medication details below on behalf of the patient.</p>
</div>

<form id="medicationForm">

<!-- Guardian Name -->
<div class="form-group">
<label for="guardianName">Guardian's Full Name</label>
<input
type="text"
id="guardianName"
placeholder="Enter Guardian's Full Name"
required>
</div>

<!-- Patient Name -->
<div class="form-group">
<label for="patientName">Patient's Full Name</label>
<input
type="text"
id="patientName"
placeholder="Enter Patient's Full Name"
required>
</div>


<div class="form-group">
  <label for="guardianEmail">Guardian Email Address</label>

  <input
    type="email"
    id="guardianEmail"
    placeholder="guardianEmail@email.com"
    required>
</div>


<!-- Medication Name -->
<div class="form-group">

<label for="medicationSelect">Medication Name</label>

<select id="medicationSelect" required>

<option value="">-- Select a Medication --</option>

<option>Acetaminophen (Paracetamol)</option>
<option>Ibuprofen</option>
<option>Aspirin</option>
<option>Amoxicillin</option>
<option>Metformin</option>
<option>Atorvastatin</option>
<option>Simvastatin</option>
<option>Losartan</option>
<option>Lisinopril</option>
<option>Amlodipine</option>
<option>Omeprazole</option>
<option>Pantoprazole</option>
<option>Levothyroxine</option>
<option>Salbutamol</option>
<option>Insulin</option>
<option>Furosemide</option>
<option>Bisoprolol</option>
<option>Metoprolol</option>
<option>Clopidogrel</option>
<option>Warfarin</option>
<option>Apixaban</option>
<option>Rivaroxaban</option>
<option>Digoxin</option>
<option>Prednisolone</option>
<option>Dexamethasone</option>
<option>Cetirizine</option>
<option>Loratadine</option>
<option>Montelukast</option>
<option>Azithromycin</option>
<option>Ciprofloxacin</option>
<option>Doxycycline</option>
<option>Co-amoxiclav</option>
<option>Flucloxacillin</option>
<option>Nitrofurantoin</option>
<option>Trimethoprim</option>
<option>Gabapentin</option>
<option>Pregabalin</option>
<option>Sertraline</option>
<option>Fluoxetine</option>
<option>Escitalopram</option>
<option>Citalopram</option>
<option>Mirtazapine</option>
<option>Amitriptyline</option>
<option>Venlafaxine</option>
<option>Quetiapine</option>
<option>Risperidone</option>
<option>Olanzapine</option>
<option>Haloperidol</option>
<option>Diazepam</option>
<option>Lorazepam</option>
<option>Alprazolam</option>
<option>Zolpidem</option>
<option>Melatonin</option>
<option>Allopurinol</option>
<option>Colchicine</option>
<option>Calcium Carbonate</option>
<option>Vitamin D</option>
<option>Ferrous Sulfate</option>
<option>Folic Acid</option>
<option>Vitamin B12</option>
<option>Multivitamin</option>
<option>Magnesium Oxide</option>
<option>Potassium Chloride</option>
<option>Senna</option>
<option>Lactulose</option>
<option>Polyethylene Glycol</option>
<option>Loperamide</option>
<option>Ondansetron</option>
<option>Domperidone</option>
<option>Metoclopramide</option>
<option>Gliclazide</option>
<option>Empagliflozin</option>
<option>Dapagliflozin</option>
<option>Sitagliptin</option>
<option>Linagliptin</option>
<option>Pioglitazone</option>
<option>Glimepiride</option>
<option>Insulin Glargine</option>
<option>Insulin Aspart</option>
<option>Tiotropium</option>
<option>Budesonide</option>
<option>Symbicort</option>
<option>Fluticasone</option>
<option>Beclometasone</option>
<option>Spironolactone</option>
<option>Hydrochlorothiazide</option>
<option>Enalapril</option>
<option>Candesartan</option>
<option>Valsartan</option>
<option>Nifedipine</option>
<option>Isosorbide Mononitrate</option>
<option>Glyceryl Trinitrate</option>
<option>Carvedilol</option>
<option>Hydralazine</option>
<option>Tamsulosin</option>
<option>Finasteride</option>
<option>Oxybutynin</option>
<option>Donepezil</option>
<option>Memantine</option>
<option>Levodopa/Carbidopa</option>
<option>Pramipexole</option>
<option>Other (Not Listed)</option>

</select>

</div>

<div class="form-group" id="otherMedicationGroup" style="display:none;">

<label for="otherMedication">Enter Medication Name</label>

<input
type="text"
id="otherMedication"
placeholder="Please enter the medication name">

</div>

<div class="form-group">
    <label for="dosage">
        Dosage
    </label>

    <input
        type="text"
        id="dosage"
        placeholder="Example: 1 tablet, 10ml, 2 capsules"
        required>
</div>

<!-- Frequency -->
<div class="form-group">

<label>How Often Does the Patient Take This Medication?</label>

<div class="radio-group">

<div class="radio-option">
<label>
<input type="radio" name="frequency" value="Once Daily" required>
Once Daily
</label>
</div>

<div class="radio-option">
<label>
<input type="radio" name="frequency" value="Twice Daily">
Twice Daily
</label>
</div>

<div class="radio-option">
<label>
<input type="radio" name="frequency" value="Three Times Daily">
Three Times Daily
</label>
</div>

<div class="radio-option">
<label>
<input type="radio" name="frequency" value="As Needed">
As Needed
</label>
</div>

</div>

</div>


<!-- Food -->
<div class="form-group">

<label>Should the medication be taken with food?</label>

<div class="radio-group">

<div class="radio-option">
<label>
<input type="radio" name="food" value="With Food" required>
With Food
</label>
</div>

<div class="radio-option">
<label>
<input type="radio" name="food" value="Without Food">
Without Food
</label>
</div>

</div>

</div>


<button type="submit">
  Submit Medication Information
</button>


</form>

<div class="success" id="successMessage">
✅ Medication information has been submitted successfully!
</div>

</div>

</div>

<script>

const medicationSelect = document.getElementById("medicationSelect");
const otherMedicationGroup = document.getElementById("otherMedicationGroup");
const otherMedication = document.getElementById("otherMedication");

medicationSelect.addEventListener("change", function(){

    if(this.value === "Other (Not Listed)"){
        otherMedicationGroup.style.display = "block";
        otherMedication.required = true;
    } else {
        otherMedicationGroup.style.display = "none";
        otherMedication.required = false;
        otherMedication.value = "";
    }

});


document
.getElementById("medicationForm")
.addEventListener("submit", submitMedication);


async function submitMedication(e){

    e.preventDefault();

    // Guardian Name
    const guardianName =
      document.getElementById("guardianName").value;

    // Patient Name
    const patientName =
      document.getElementById("patientName").value;

    // Medication Name
    let medicationName =
      document.getElementById("medicationSelect").value;

    // If "Other"
    if(medicationName === "Other (Not Listed)"){

        medicationName =
          document.getElementById("otherMedication").value;

    }

    // Frequency
    const frequency =
      document.querySelector(
        'input[name="frequency"]:checked'
      )?.value || "";

    // Food
    const food =
      document.querySelector(
        'input[name="food"]:checked'
      )?.value || "";

    const data = {

    guardianName:
      document.getElementById("guardianName").value,

    patientName:
      document.getElementById("patientName").value,

    guardianEmail:
      document.getElementById("guardianEmail").value,

    medication:
      medicationName,

    frequency:
      frequency,

    food:
      food

};

    if(!data.guardianEmail){

    alert("Please enter a guardian email.");

    return;

}

    try{

        const response = await fetch(
          "https://n8ngc.codeblazar.org/webhook-test/medication",
          {
              method:"POST",
              headers:{
                  "Content-Type":"application/json"
              },
              body:JSON.stringify(data)
          }
        );

        if(!response.ok){

    throw new Error("Webhook failed");

}

const result = await response.text();

console.log("n8n Response:", result);

        document.getElementById(
          "successMessage"
        ).style.display = "block";

        document.getElementById(
          "medicationForm"
        ).reset();

        otherMedicationGroup.style.display = "none";

        window.scrollTo({
            top:document.body.scrollHeight,
            behavior:"smooth"
        });

    }
    catch(error){

        console.error(error);

        alert(
          "Unable to connect to n8n webhook."
        );

    }

}

</script>

</body>
</html>
